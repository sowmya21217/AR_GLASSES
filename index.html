<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meta Glasses Style AR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  
  :root { --green: #00ff88; --cyan: #00e5ff; }
  
  * { margin:0; padding:0; box-sizing:border-box; }
  body, html { height:100%; overflow:hidden; background:#000; font-family:'Share Tech Mono', monospace; }

  #video { 
    position:fixed; inset:0; width:100%; height:100%; 
    object-fit:cover; z-index:1; 
  }

  #hud { position:fixed; inset:0; z-index:10; pointer-events:none; }

  #overlay {
    position:fixed; inset:0; z-index:2; pointer-events:none;
    background: repeating-linear-gradient(transparent 0px, transparent 3px, rgba(0,255,136,0.03) 3px, rgba(0,255,136,0.03) 4px),
                radial-gradient(circle at center, transparent 70%, rgba(0,0,0,0.6) 100%);
    animation: scan 12s linear infinite;
  }
  @keyframes scan { from {background-position:0 0;} to {background-position:0 600px;} }

  /* Floating like real glasses */
  #zone {
    position:absolute; top:22%; left:50%; transform:translateX(-50%);
    font-family:'Orbitron',sans-serif; font-size:52px; font-weight:900;
    color:var(--green); text-shadow:0 0 40px var(--green); letter-spacing:4px;
    opacity:0.9;
  }

  #info {
    position:absolute; top:38%; left:50%; transform:translateX(-50%);
    width:82%; max-width:460px;
    background:rgba(10,10,10,0.55); 
    border:1px solid var(--green);
    padding:18px 22px; border-radius:12px;
    backdrop-filter:blur(16px);
    text-align:center;
  }
  #title { 
    font-family:'Orbitron',sans-serif; 
    font-size:19px; 
    margin-bottom:10px; 
    color:white; 
  }
  #desc { 
    font-size:13.8px; 
    line-height:1.65; 
    color:#ddd; 
  }

  #toast {
    position:absolute; top:62%; left:50%; transform:translate(-50%,-50%);
    background:rgba(0,229,255,0.15); border:1.5px solid var(--cyan);
    padding:10px 28px; border-radius:50px; font-size:15px; opacity:0; transition:0.4s;
  }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<div id="overlay"></div>

<div id="hud">
  <div id="zone">A1</div>
  <div id="info">
    <div id="title">Statue of Apollo</div>
    <div id="desc">Marble, circa 460 BCE. One of the finest examples of Early Classical Greek sculpture. Note the perfect contrapposto stance representing harmony and movement.</div>
  </div>
  <div id="toast"></div>
</div>

<button id="startBtn" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:100; padding:22px 60px; background:transparent; border:3px solid #0f0; color:#0f0; font-size:18px; border-radius:12px;">
  START META GLASSES VIEW
</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
// Fake rich data
const ZONES = [
  { id: "A1", title: "Statue of Apollo", desc: "Marble, circa 460 BCE. One of the finest examples of Early Classical Greek sculpture. Note the perfect contrapposto stance representing harmony and movement." },
  { id: "A2", title: "Red Figure Amphora", desc: "Attic vase, circa 490 BCE. Depicts Heracles fighting the Nemean Lion. The red-figure technique allowed unprecedented detail and emotion." },
  { id: "A3", title: "Bronze Riace Warrior", desc: "5th century BCE Greek bronze. Discovered in the sea. Remarkable preservation with original inlaid eyes." }
];

let currentZone = 0;

const video = document.getElementById('video');
const zoneEl = document.getElementById('zone');
const titleEl = document.getElementById('title');
const descEl = document.getElementById('desc');
const toastEl = document.getElementById('toast');
const startBtn = document.getElementById('startBtn');

function updateZone() {
  const z = ZONES[currentZone];
  zoneEl.textContent = z.id;
  titleEl.textContent = z.title;
  descEl.textContent = z.desc;
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.style.opacity = 1;
  setTimeout(() => toastEl.style.opacity = 0, 1600);
}

function onHandResults(results) {
  if (!results.multiHandLandmarks?.length) return;
  const lm = results.multiHandLandmarks[0];
  const pinch = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);

  if (pinch < 0.07 && Date.now() - (window.lastP || 0) > 1400) {
    window.lastP = Date.now();
    const utterance = new SpeechSynthesisUtterance(ZONES[currentZone].title + ". " + ZONES[currentZone].desc);
    utterance.rate = 0.9;
    speechSynthesis.speak(utterance);
    showToast("🔊 SPEAKING");
  }
}

async function start() {
  startBtn.style.display = "none";

  let stream = null;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
  } catch (e) {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
  }

  video.srcObject = stream;
  await video.play();

  const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({ maxNumHands:1, modelComplexity:0 });
  hands.onResults(onHandResults);

  const camera = new Camera(video, { onFrame: async () => await hands.send({image: video}) });
  await camera.start();

  updateZone();
  showToast("✅ META GLASSES STYLE ACTIVE");
}

startBtn.addEventListener('click', start);
</script>
</body>
</html>
