<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AR Glasses MVP v3</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

#video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* HUD like glasses */
#hud {
  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
  background: rgba(0,0,0,0.55);
  padding: 10px;
  border-radius: 10px;
  z-index: 10;
}

#overlay {
  position: fixed;
  bottom: 12%;
  left: 5%;
  right: 5%;
  color: white;
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border-radius: 12px;
  z-index: 10;
}
</style>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="hud">
  <div id="zoneLabel">Zone: NONE</div>
</div>

<div id="overlay">
  <h2 id="title">Loading...</h2>
  <p id="desc">Show hand to interact</p>
</div>

<script>

// --------------------
// MUSEUM DATA
// --------------------
const zones = {
  A1: {
    title: "Statue of Apollo",
    desc: "Roman artifact from 2nd century BC"
  },
  A2: {
    title: "Ancient Greek Vase",
    desc: "Ceramic pottery used in rituals"
  }
};

let currentZone = "A1";

// --------------------
// SPEECH (NO REPEAT FIX)
// --------------------
let speaking = false;

function speak(text) {
  if (speaking) return;

  speaking = true;
  speechSynthesis.cancel();

  let msg = new SpeechSynthesisUtterance(text);

  msg.onend = () => {
    speaking = false;
  };

  speechSynthesis.speak(msg);
}

// --------------------
// UI UPDATE
// --------------------
function setZone(z) {
  currentZone = z;

  document.getElementById("zoneLabel").innerText =
    "Zone: " + z;

  document.getElementById("title").innerText =
    zones[z].title;

  document.getElementById("desc").innerText =
    zones[z].desc;
}

// init
setZone("A1");

// --------------------
// CAMERA (FORCE BACK CAMERA)
// --------------------
const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
})
.then(stream => {
  video.srcObject = stream;
})
.catch(() => {
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  }).then(stream => {
    video.srcObject = stream;
  });
});

// --------------------
// HAND TRACKING
// --------------------
const hands = new Hands({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

// --------------------
// GESTURE ENGINE
// --------------------
let lastActionTime = 0;

hands.onResults(results => {
  if (!results.multiHandLandmarks) return;

  const now = Date.now();
  if (now - lastActionTime < 1200) return;

  const hand = results.multiHandLandmarks[0];

  const index = hand[8];
  const thumb = hand[4];

  const dx = index.x - thumb.x;
  const dy = index.y - thumb.y;

  const distance = Math.sqrt(dx*dx + dy*dy);

  // 🤏 PINCH → SPEAK
  if (distance < 0.05) {
    lastActionTime = now;

    speak(
      zones[currentZone].title +
      ". " +
      zones[currentZone].desc
    );
  }

  // 👉 swipe right → next zone
  if (index.x > 0.75) {
    lastActionTime = now;
    setZone("A2");
  }

  // 👈 swipe left → prev zone
  if (index.x < 0.25) {
    lastActionTime = now;
    setZone("A1");
  }
});

// --------------------
// CAMERA → MEDIAPIPE PIPELINE
// --------------------
const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 640,
  height: 480
});

camera.start();

</script>

</body>
</html>
