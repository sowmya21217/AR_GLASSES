<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Test</title>
  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js";

    let scene, camera, renderer, reticle;

    async function init() {
      renderer = new THREE.WebGLRenderer({ alpha: true });
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera();

      const light = new THREE.HemisphereLight(0xffffff, 0x444444);
      scene.add(light);

      // Green reticle
      reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.08, 0.1, 32),
        new THREE.MeshBasicMaterial({ color: 0x00ff88, side: THREE.DoubleSide })
      );
      reticle.rotation.x = -Math.PI / 2;
      reticle.matrixAutoUpdate = false;
      reticle.visible = false;
      scene.add(reticle);

      const button = ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] });
      document.body.appendChild(button);

      renderer.setAnimationLoop(render);
    }

    function render(timestamp, frame) {
      if (frame) {
        const refSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();

        // Simple hit test logic here...
      }
      renderer.render(scene, camera);
    }

    init();
  </script>
</head>
<body style="margin:0; overflow:hidden; background:#000;"></body>
</html>
