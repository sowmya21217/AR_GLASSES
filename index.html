<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Air Glasses View - Huawei</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root { --green: #00ff88; --cyan: #00e5ff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body,html { height:100%; overflow:hidden; background:#000; font-family:'Share Tech Mono', monospace; }

  #video { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }

  #overlay {
    position:fixed; inset:0; z-index:2; pointer-events:none;
    background: repeating-linear-gradient(transparent 0px, transparent 4px, rgba(0,255,136,0.04) 4px, rgba(0,255,136,0.04) 5px),
                radial-gradient(ellipse at center, transparent 65%, rgba(0,0,0,0.65) 100%);
    animation: scan 10s linear infinite;
  }
  @keyframes scan { from {background-position:0 0;} to {background-position:0 500px;} }

  /* Floating HUD - feels more "in air" */
  #zone { 
    position:absolute; top:15%; left:50%; transform:translateX(-50%);
    font-family:'Orbitron',sans-serif; font-size:48px; font-weight:900; 
    text-shadow:0 0 30px var(--green); opacity:0.95;
  }

  #info {
    position:absolute; top:28%; left:50%; transform:translateX(-50%);
    width:85%; max-width:420px;
    background:rgba(0,0,0,0.65); border:1.5px solid var(--green);
    padding:16px 20px; border-radius:12px; backdrop-filter:blur(12px);
    text-align:center;
  }
  #title { font-family:'Orbitron',sans-serif; font-size:18px; margin-bottom:8px; }
  #desc { font-size:13.5px; line-height:1.6; color:#ddd; }

  #toast { 
    position:absolute; top:55%; left:50%; transform:translate(-50%,-50%);
    background:rgba(0,229,255,0.18); border:2px solid var(--cyan);
    padding:12px 30px; border-radius:50px; font-size:15px; opacity:0; transition:0.4s;
  }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<div id="overlay"></div>

<div id="hud">
  <div id="zone">A1</div>
  <div id="info">
    <div id="title">Statue of Apollo</div>
    <div id="desc">Pinch in the air in front of the monument to hear info</div>
  </div>
  <div id="toast"></div>
</div>

<button id="startBtn" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;padding:20px 55px;background:transparent;border:3px solid #0f0;color:#0f0;font-size:18px;border-radius:12px;">
  START AIR GLASSES VIEW
</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
// Data + logic (same as before)
const ZONES = [
  { id: "A1", title: "Statue of Apollo", desc: "Marble sculpture, c. 460 BCE. Early Classical Greek art with ideal human form." },
  { id: "A2", title: "Ancient Greek Vase", desc: "Red-figure pottery, c. 490 BCE. Depicts the labours of Heracles." }
];

let currentZone = 0;

const video = document.getElementById('video');
const zoneEl = document.getElementById('zone');
const titleEl = document.getElementById('title');
const descEl = document.getElementById('desc');
const toastEl = document.getElementById('toast');
const startBtn = document.getElementById('startBtn');

function updateZone() {
  const z = ZONES[currentZone];
  zoneEl.textContent = z.id;
  titleEl.textContent = z.title;
  descEl.textContent = z.desc;
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.style.opacity = 1;
  setTimeout(() => toastEl.style.opacity = 0, 1600);
}

function onHandResults(results) {
  if (!results.multiHandLandmarks?.length) return;
  const lm = results.multiHandLandmarks[0];
  const pinch = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);

  if (pinch < 0.07 && Date.now() - (window.lastP||0) > 1400) {
    window.lastP = Date.now();
    const ut = new SpeechSynthesisUtterance(ZONES[currentZone].title + ". " + ZONES[currentZone].desc);
    speechSynthesis.speak(ut);
    showToast("🔊 SPEAKING");
  }
}

async function start() {
  startBtn.style.display = "none";

  let stream = null;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: {ideal: 1280} }
    });
  } catch (e) {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
  }

  video.srcObject = stream;
  await video.play();

  const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({ maxNumHands:1, modelComplexity:0 });
  hands.onResults(onHandResults);

  const camera = new Camera(video, { onFrame: async () => await hands.send({image: video}) });
  await camera.start();

  updateZone();
  showToast("✅ AIR GLASSES VIEW READY");
}

startBtn.addEventListener('click', start);
</script>
</body>
</html>
