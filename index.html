<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Museum AR Glasses - Test Mode</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root { --green: #00ff88; --cyan: #00e5ff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body,html { height:100%; overflow:hidden; background:#000; font-family:'Share Tech Mono', monospace; }

  #video { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }

  #overlay {
    position:fixed; inset:0; z-index:2; pointer-events:none;
    background: repeating-linear-gradient(transparent 0px, transparent 4px, rgba(0,255,136,0.05) 4px, rgba(0,255,136,0.05) 5px),
                radial-gradient(ellipse at center, transparent 62%, rgba(0,0,0,0.75) 100%);
    animation: scan 9s linear infinite;
  }
  @keyframes scan { from {background-position:0 0;} to {background-position:0 450px;} }

  #zone { 
    position:absolute; top:18%; left:50%; transform:translateX(-50%);
    font-family:'Orbitron',sans-serif; font-size:46px; font-weight:900; 
    text-shadow:0 0 30px var(--green); letter-spacing:3px;
  }

  #info {
    position:absolute; top:32%; left:50%; transform:translateX(-50%);
    width:88%; max-width:460px;
    background:rgba(0,0,0,0.68); border:2px solid var(--green);
    padding:20px; border-radius:14px; backdrop-filter:blur(14px); text-align:center;
  }
  #title { font-family:'Orbitron',sans-serif; font-size:20px; margin-bottom:10px; color:white; }
  #desc { font-size:14px; line-height:1.65; color:#ddd; }

  #toast { 
    position:absolute; top:58%; left:50%; transform:translate(-50%,-50%);
    background:rgba(0,229,255,0.22); border:2px solid var(--cyan);
    padding:14px 36px; border-radius:50px; font-size:16px; opacity:0; transition:0.4s;
  }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<div id="overlay"></div>

<div id="hud">
  <div id="zone">A1</div>
  <div id="info">
    <div id="title">Statue of Apollo</div>
    <div id="desc">Marble sculpture from 460 BCE. One of the greatest surviving examples of Early Classical Greek art. The god of music and light is shown in perfect contrapposto stance.</div>
  </div>
  <div id="toast"></div>
</div>

<button id="startBtn" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;padding:22px 60px;background:transparent;border:3px solid #0f0;color:#0f0;font-size:18px;border-radius:12px;">
  START AIR GLASSES TEST
</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
// More fake realistic data
const ZONES = [
  { 
    id: "A1", 
    title: "Statue of Apollo", 
    desc: "Marble sculpture, c. 460 BCE. Masterpiece of Early Classical Greek art. Apollo, god of music and light, is depicted in ideal human form with beautiful contrapposto stance." 
  },
  { 
    id: "A2", 
    title: "Red-Figure Amphora", 
    desc: "Attic vase, c. 490 BCE. Shows Heracles fighting the Nemean Lion. The red-figure technique allowed artists to create incredibly detailed and expressive figures." 
  },
  { 
    id: "A3", 
    title: "Bronze Warrior", 
    desc: "Greek bronze statue from 5th century BCE. Found in the sea near Riace, Italy. Remarkable preservation of original inlaid eyes and silver teeth." 
  }
];

let currentZone = 0;

const video = document.getElementById('video');
const zoneEl = document.getElementById('zone');
const titleEl = document.getElementById('title');
const descEl = document.getElementById('desc');
const toastEl = document.getElementById('toast');
const startBtn = document.getElementById('startBtn');

function updateZone() {
  const z = ZONES[currentZone];
  zoneEl.textContent = z.id;
  titleEl.textContent = z.title;
  descEl.textContent = z.desc;
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.style.opacity = 1;
  setTimeout(() => toastEl.style.opacity = 0, 1800);
}

function onHandResults(results) {
  if (!results.multiHandLandmarks?.length) return;
  const lm = results.multiHandLandmarks[0];
  const pinchDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);

  if (pinchDist < 0.07 && Date.now() - (window.lastPinch || 0) > 1400) {
    window.lastPinch = Date.now();
    const text = ZONES[currentZone].title + ". " + ZONES[currentZone].desc;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.92;
    speechSynthesis.speak(utterance);
    showToast("🔊 SPEAKING");
  }
}

async function startTest() {
  startBtn.style.display = "none";

  let stream = null;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: "environment", width: {ideal: 1280} } 
    });
  } catch (e) {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
  }

  video.srcObject = stream;
  await video.play();

  const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({ maxNumHands:1, modelComplexity:0 });
  hands.onResults(onHandResults);

  const camera = new Camera(video, { 
    onFrame: async () => await hands.send({image: video}) 
  });
  await camera.start();

  updateZone();
  showToast("✅ AIR GLASSES TEST ACTIVE");
}

startBtn.addEventListener('click', startTest);
</script>
</body>
</html>
