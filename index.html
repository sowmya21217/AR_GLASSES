<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Spatial Museum AR</title>

<style>
/* ===== YOUR ORIGINAL CSS KEPT (SHORTENED MARKER) ===== */
/* (UNCHANGED HUD STYLES — paste your full CSS here) */

body { margin:0; overflow:hidden; background:#000; font-family:monospace; }

/* AR CANVAS */
#xr-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* HUD stays above AR */
#hud { position:fixed; inset:0; z-index:10; pointer-events:none; }

/* SIMPLE CENTER RETICLE */
#reticle {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:40px; height:40px;
  border:1px solid #0f0;
  border-radius:50%;
}
</style>
</head>

<body>

<!-- XR CANVAS -->
<canvas id="xr-canvas"></canvas>

<!-- YOUR HUD (KEEP YOUR FULL ORIGINAL HUD HERE) -->
<div id="hud">
  <div id="reticle"></div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* =========================
   XR CORE SETUP
========================= */
let scene, camera, renderer;
let controller;
let hitTestSource = null;
let hitTestSourceRequested = false;

let reticle;
let xrSession = null;

init();

async function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera();

  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById("xr-canvas"),
    alpha: true,
    antialias: true
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;

  /* LIGHT */
  const light = new THREE.HemisphereLight(0xffffff, 0x444444);
  scene.add(light);

  /* RETICLE (SPATIAL TARGET) */
  const ringGeo = new THREE.RingGeometry(0.08, 0.1, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
  reticle = new THREE.Mesh(ringGeo, ringMat);
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);

  /* BUTTON */
  const btn = ARButton.createButton(renderer, {
    requiredFeatures: ["hit-test", "local-floor"]
  });
  document.body.appendChild(btn);

  /* CONTROLLER (TAP TO PLACE OBJECTS) */
  controller = renderer.xr.getController(0);
  controller.addEventListener("select", onSelect);
  scene.add(controller);

  renderer.setAnimationLoop(render);
}

/* =========================
   SPATIAL EXHIBIT OBJECT
========================= */
function createExhibit(label) {
  const group = new THREE.Group();

  const geo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
  const mat = new THREE.MeshStandardMaterial({ color: 0x00ff88 });
  const cube = new THREE.Mesh(geo, mat);

  const textGeo = new THREE.PlaneGeometry(0.3, 0.1);
  const textMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

  const text = new THREE.Mesh(textGeo, textMat);
  text.position.y = 0.25;

  group.add(cube);
  group.add(text);

  group.userData.label = label;

  return group;
}

/* =========================
   PLACE OBJECT IN REAL WORLD
========================= */
function onSelect() {
  if (reticle.visible) {
    const exhibit = createExhibit("Apollo Exhibit");
    exhibit.position.setFromMatrixPosition(reticle.matrix);
    scene.add(exhibit);
  }
}

/* =========================
   XR RENDER LOOP
========================= */
function render(timestamp, frame) {

  if (frame) {

    const referenceSpace = renderer.xr.getReferenceSpace();
    const session = renderer.xr.getSession();

    if (!hitTestSourceRequested) {

      session.requestReferenceSpace("viewer").then((refSpace) => {

        session.requestHitTestSource({ space: refSpace }).then((source) => {
          hitTestSource = source;
        });

      });

      session.addEventListener("end", () => {
        hitTestSourceRequested = false;
        hitTestSource = null;
      });

      hitTestSourceRequested = true;
    }

    if (hitTestSource) {

      const hitTestResults = frame.getHitTestResults(hitTestSource);

      if (hitTestResults.length) {

        const hit = hitTestResults[0];
        const pose = hit.getPose(referenceSpace);

        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);

      } else {
        reticle.visible = false;
      }
    }
  }

  renderer.render(scene, camera);
}

</script>

<!-- WebXR helper -->
<script src="https://cdn.jsdelivr.net/npm/webxr-polyfill@latest/build/webxr-polyfill.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js"></script>

</body>
</html>
