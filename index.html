<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AR Museum Glasses MVP v2</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
}

#video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#overlay {
  position: fixed;
  bottom: 12%;
  left: 5%;
  right: 5%;
  color: white;
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border-radius: 12px;
}

#controls {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}
</style>

<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="overlay">
  <h2 id="title">Select Zone</h2>
  <p id="desc">Tap zone to start museum tour</p>
</div>

<div id="controls">
  <button onclick="setZone('A1')">Zone A1</button>
  <button onclick="setZone('A2')">Zone A2</button>
  <button onclick="speak()">🔊 Speak</button>
</div>

<script>
// --------------------
// DATA
// --------------------
const museum = {
  A1: {
    title: "Statue of Apollo",
    desc: "Roman statue from 2nd century BC."
  },
  A2: {
    title: "Ancient Vase",
    desc: "Greek pottery artifact."
  }
};

let currentZone = null;

// --------------------
// VOICE FIX (NO REPEAT)
// --------------------
let isSpeaking = false;

function speak() {
  if (!currentZone || isSpeaking) return;

  const text =
    museum[currentZone].title + ". " +
    museum[currentZone].desc;

  isSpeaking = true;

  let msg = new SpeechSynthesisUtterance(text);

  msg.onend = () => {
    isSpeaking = false;
  };

  speechSynthesis.cancel(); // 🔥 stops duplicate queue
  speechSynthesis.speak(msg);
}

// --------------------
// CAMERA
// --------------------
const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;
});

// --------------------
// ZONE SYSTEM
// --------------------
function setZone(zone) {
  currentZone = zone;

  document.getElementById("title").innerText =
    museum[zone].title;

  document.getElementById("desc").innerText =
    museum[zone].desc;

  speak(); // auto speak once ONLY
}

// --------------------
// SWIPE GESTURE FIX
// --------------------
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) nextZone();
  if (endX - startX > 50) prevZone();
});

// --------------------
// ZONE NAVIGATION
// --------------------
const zones = ["A1", "A2"];
let index = 0;

function nextZone() {
  index = (index + 1) % zones.length;
  setZone(zones[index]);
}

function prevZone() {
  index = (index - 1 + zones.length) % zones.length;
  setZone(zones[index]);
}

</script>

</body>
</html>
