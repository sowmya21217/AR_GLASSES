<style>

    --glass-bg: rgba(0,0,0,0.55); --glass-border: rgba(0,255,136,0.35);

  }

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js";

// === YOUR ORIGINAL SCRIPT LOGIC (ZONES, MediaPipe, gestures, HUD updates) ===
/* Paste almost your entire <script> content here, including ZONES array, state, updateHUD, speak, gesture handlers, MediaPipe setup, etc. */

// Keep your MediaPipe preload, onResults (swipe/pinch), touch fallback, etc.

// === THREE.JS + WEBXR SETUP ===
let scene, camera, renderer;
let reticle;
let hitTestSource = null;
let hitTestSourceRequested = false;
let xrSession = null;

const placedExhibits = [];

async function initThree() {
  const canvas = document.getElementById('xr-canvas');
  renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.xr.enabled = true;

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera();

  // Lighting
  const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
  scene.add(hemi);

  // Spatial reticle (floating ring)
  const ringGeo = new THREE.RingGeometry(0.12, 0.15, 32);
  const ringMat = new THREE.MeshBasicMaterial({ 
    color: 0x00ff88, 
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.7
  });
  reticle = new THREE.Mesh(ringGeo, ringMat);
  reticle.rotation.x = -Math.PI / 2;
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);

  // Add a subtle grid or plane helper if you want
  // const grid = new THREE.GridHelper(2, 10, 0x00ff88, 0x00ff88);
  // grid.material.opacity = 0.15; grid.material.transparent = true;
  // scene.add(grid);

  // AR Button (immersive-ar)
  const arButton = ARButton.createButton(renderer, {
    requiredFeatures: ['hit-test'],
    optionalFeatures: ['local-floor']
  });
  document.body.appendChild(arButton);

  // Controller / Select event (tap to place)
  const controller = renderer.xr.getController(0);
  controller.addEventListener('select', onSelect);
  scene.add(controller);

  renderer.setAnimationLoop(render);
}

function createExhibit(zone) {
  const group = new THREE.Group();

  // Simple glowing box as exhibit placeholder (replace with GLTF model later)
  const box = new THREE.Mesh(
    new THREE.BoxGeometry(0.25, 0.35, 0.15),
    new THREE.MeshStandardMaterial({ color: 0x00e5ff, emissive: 0x00ff88, emissiveIntensity: 0.3 })
  );
  group.add(box);

  // Label plane (you can improve with TextGeometry or CSS2DObject)
  const labelGeo = new THREE.PlaneGeometry(0.4, 0.12);
  const labelMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
  const label = new THREE.Mesh(labelGeo, labelMat);
  label.position.set(0, 0.3, 0);
  label.rotation.x = -Math.PI / 2;
  group.add(label);

  group.userData = { zoneId: zone.id, title: zone.title };
  return group;
}

function onSelect() {
  if (!reticle.visible) return;

  const currentZone = ZONES[currentZoneIndex];
  const exhibit = createExhibit(currentZone);

  // Position at reticle
  const pos = new THREE.Vector3();
  pos.setFromMatrixPosition(reticle.matrix);
  exhibit.position.copy(pos);

  // Slight random rotation for natural feel
  exhibit.rotation.y = Math.random() * Math.PI * 2;

  scene.add(exhibit);
  placedExhibits.push(exhibit);

  showToast(`✅ Placed ${currentZone.title}`);
}

// Render loop with hit test
function render(timestamp, frame) {
  if (frame) {
    const referenceSpace = renderer.xr.getReferenceSpace();
    const session = renderer.xr.getSession();

    if (!hitTestSourceRequested) {
      session.requestReferenceSpace('viewer').then((viewerSpace) => {
        session.requestHitTestSource({ space: viewerSpace }).then((source) => {
          hitTestSource = source;
        });
      });
      hitTestSourceRequested = true;
    }

    if (hitTestSource) {
      const hitTestResults = frame.getHitTestResults(hitTestSource);
      if (hitTestResults.length > 0) {
        const hit = hitTestResults[0];
        const pose = hit.getPose(referenceSpace);
        if (pose) {
          reticle.visible = true;
          reticle.matrix.fromArray(pose.transform.matrix);
        }
      } else {
        reticle.visible = false;
      }
    }
  }

  // Your original HUD / gesture logic runs independently
  renderer.render(scene, camera);
}

// === INTEGRATION WITH YOUR ORIGINAL INIT ===
const originalInitApp = initApp; // rename your original if needed

async function startSpatialAR() {
  // Start your original camera + MediaPipe for gestures/HUD
  await initApp(); // your original function (camera, MediaPipe, etc.)

  // Now start Three.js + WebXR
  await initThree();

  // Optional: hide video element since WebXR provides the passthrough camera
  document.getElementById('video').style.display = 'none';
}

// Modify your start button click
startBtn.addEventListener('click', () => {
  startBtn.textContent = 'STARTING SPATIAL AR…';
  startBtn.disabled = true;
  startSpatialAR();
});

// Expose some globals if needed for cross-talk between HUD and 3D
window.placedExhibits = placedExhibits;
</script>

<!-- Polyfill + helpers -->
<script src="https://cdn.jsdelivr.net/npm/webxr-polyfill@latest/build/webxr-polyfill.min.js"></script>

</body>
</html>
